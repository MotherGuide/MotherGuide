<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotherGuide — Sign In</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/8eed1c1f47.js" crossorigin="anonymous"></script>

    <style>
        /* ─── Reset & Variables ─── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --teal:       #0d9488;
            --teal-dark:  #0a7a6f;
            --teal-light: #e6f7f6;
            --rose:       #e75480;
            --rose-dark:  #c9335f;
            --slate:      #475569;
            --slate-light:#94a3b8;
            --border:     #e2e8f0;
            --bg-card:    rgba(255,255,255,0.97);
            --radius:     14px;
            --shadow-card:0 24px 60px rgba(0,0,0,0.28);
            --transition: .25s ease;
        }

        body {
            font-family: 'Nunito', sans-serif;
            color: #334155;
            min-height: 100vh;
            background: url(./images/bg.png) no-repeat center top / cover fixed;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background: linear-gradient(160deg, rgba(13,148,136,0.45) 0%, rgba(0,0,0,0.40) 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* ─── Navbar ─── */
        #navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200;
            height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px;
            background: rgba(13,148,136,0.96);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 16px rgba(0,0,0,0.15);
        }

        .logo {
            display: flex; align-items: center; gap: 2px;
            text-decoration: none;
            font-family: 'Playfair Display', serif;
            font-weight: 700; font-size: 21px;
            color: #fff;
            letter-spacing: .3px;
        }
        .logo img { width: 82px; margin-right: -12px; }

        .nav-links { display: flex; align-items: center; gap: 28px; }
        .nav-links a {
            text-decoration: none; color: rgba(255,255,255,0.90);
            font-size: 14.5px; font-weight: 600;
            letter-spacing: .2px;
            position: relative; padding-bottom: 2px;
            transition: color var(--transition);
        }
        .nav-links a::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0;
            height: 2px; background: var(--rose);
            transform: scaleX(0); transform-origin: left;
            transition: transform var(--transition);
        }
        .nav-links a:hover { color: #fff; }
        .nav-links a:hover::after { transform: scaleX(1); }

        /* Hamburger */
        .hamburger {
            display: none; flex-direction: column; justify-content: center;
            gap: 5px; cursor: pointer; background: none; border: none; padding: 4px;
        }
        .hamburger span {
            display: block; width: 24px; height: 2px;
            background: #fff; border-radius: 2px; transition: all .3s ease;
        }
        .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* Mobile menu */
        .mobile-menu {
            display: none; position: fixed; top: 64px; left: 0; width: 100%;
            background: rgba(11,122,111,0.98); backdrop-filter: blur(12px);
            flex-direction: column; padding: 12px 24px 20px; z-index: 190;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .mobile-menu.open { display: flex; }
        .mobile-menu a {
            color: #fff; font-size: 15px; font-weight: 600;
            padding: 13px 0; border-bottom: 1px solid rgba(255,255,255,0.12);
            text-decoration: none; transition: color .2s;
        }
        .mobile-menu a:last-child { border-bottom: none; }
        .mobile-menu a:hover { color: var(--rose); }

        @media (max-width: 640px) {
            .nav-links { display: none; }
            .hamburger { display: flex; }
            #navbar { padding: 0 20px; }
        }

        /* ─── Main Layout ─── */
        main {
            position: relative; z-index: 1;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 88px 20px 40px;
        }

        .auth-wrapper {
            width: 100%; max-width: 460px;
            animation: fadeUp .5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Decorative brand label */
        .brand-label {
            text-align: center; margin-bottom: 18px;
        }
        .brand-label span {
            display: inline-block;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(6px);
            color: #fff;
            font-size: 13px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            padding: 6px 18px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.25);
        }

        /* ─── Card ─── */
        .auth-card {
            background: var(--bg-card);
            border-radius: 22px;
            padding: 38px 40px 42px;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(255,255,255,0.6);
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 30px;
        }
        .tab-btn {
            flex: 1; padding: 11px;
            border: none; background: transparent;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-weight: 700; font-size: 14px;
            color: var(--slate-light);
            border-radius: 9px;
            transition: all var(--transition);
        }
        .tab-btn.active {
            background: #fff;
            color: var(--teal);
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }

        /* Panel */
        .form-panel { display: none; }
        .form-panel.active { display: block; }

        /* Heading inside panel */
        .panel-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px; font-weight: 700;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .panel-sub {
            font-size: 13.5px; color: var(--slate-light);
            margin-bottom: 26px;
        }

        /* Input Group */
        .input-group { margin-bottom: 18px; }

        .input-group label {
            display: block;
            font-size: 12.5px; font-weight: 700;
            color: var(--slate);
            letter-spacing: .4px; text-transform: uppercase;
            margin-bottom: 7px;
        }

        .input-wrap { position: relative; }

        .input-wrap input,
        .input-wrap select {
            width: 100%;
            padding: 12px 44px 12px 42px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-family: 'Nunito', sans-serif;
            font-size: 14px; color: #1e293b;
            background: #fff;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
            appearance: none;
        }

        .input-wrap input:focus,
        .input-wrap select:focus {
            border-color: var(--teal);
            background: var(--teal-light);
            box-shadow: 0 0 0 3px rgba(13,148,136,0.12);
        }

        .input-wrap input::placeholder { color: #cbd5e1; }

        .input-wrap .icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--slate-light); font-size: 14px;
            pointer-events: none;
        }

        .toggle-pw {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            color: var(--slate-light); cursor: pointer; font-size: 14px;
            transition: color var(--transition);
        }
        .toggle-pw:hover { color: var(--teal); }

        /* Select arrow */
        .select-arrow {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            color: var(--slate-light); pointer-events: none; font-size: 12px;
        }

        /* Row layout */
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        @media (max-width: 420px) { .input-row { grid-template-columns: 1fr; } }

        /* Forgot */
        .forgot-link {
            display: block; text-align: right;
            font-size: 13px; font-weight: 700; color: var(--teal);
            text-decoration: none; margin-top: -6px; margin-bottom: 22px;
            transition: color var(--transition);
        }
        .forgot-link:hover { color: var(--teal-dark); }

        /* Submit Button */
        .btn-submit {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--rose) 0%, #d6336c 100%);
            color: #fff; border: none; border-radius: var(--radius);
            font-family: 'Nunito', sans-serif;
            font-size: 15px; font-weight: 800;
            letter-spacing: .3px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(231,84,128,0.35);
            transition: all var(--transition);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(231,84,128,0.40);
        }
        .btn-submit:active { transform: translateY(0); }

        /* Loading spinner on button */
        .btn-submit .spinner {
            display: none; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff; border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        .btn-submit.loading .spinner { display: block; }
        .btn-submit.loading .btn-label { opacity: .7; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Divider */
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 24px 0 0;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .divider span { font-size: 12px; color: var(--slate-light); font-weight: 600; }

        /* Switch prompt */
        .switch-prompt {
            text-align: center; margin-top: 14px;
            font-size: 13.5px; color: var(--slate);
        }
        .switch-prompt a {
            color: var(--teal); font-weight: 700; text-decoration: none;
        }
        .switch-prompt a:hover { text-decoration: underline; }

        /* ─── Alert / Error Banner ─── */
        .alert {
            display: none;
            padding: 11px 14px; border-radius: 10px;
            font-size: 13.5px; font-weight: 600;
            margin-bottom: 18px; align-items: center; gap: 9px;
        }
        .alert.error   { display: flex; background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .alert.success { display: flex; background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }

        /* ─── Password Strength ─── */
        .strength-bar-wrap {
            height: 4px; border-radius: 4px; background: var(--border);
            margin-top: 8px; overflow: hidden; display: none;
        }
        .strength-bar {
            height: 100%; border-radius: 4px;
            transition: width .3s ease, background .3s ease;
            width: 0%;
        }
        .strength-label {
            font-size: 11.5px; margin-top: 4px;
            font-weight: 700; display: none;
        }

        /* ─── Terms checkbox ─── */
        .terms-row {
            display: flex; align-items: flex-start; gap: 10px;
            margin: 16px 0 4px;
        }
        .terms-row input[type="checkbox"] {
            width: 16px; height: 16px; margin-top: 2px; flex-shrink: 0;
            accent-color: var(--teal); cursor: pointer;
        }
        .terms-row label {
            font-size: 13px; color: var(--slate);
            font-weight: 500; letter-spacing: 0; text-transform: none;
            cursor: pointer;
        }
        .terms-row a { color: var(--teal); font-weight: 700; text-decoration: none; }

        /* ─── Footer note ─── */
        .footer-note {
            text-align: center; margin-top: 20px;
            font-size: 12px; color: rgba(255,255,255,0.65);
        }
    </style>
</head>
<body>

<!-- ─── Navbar ─── -->
<header id="navbar">
    <a class="logo" href="./index.php">
        <img src="images/logo.png" alt="MotherGuide"> MotherGuide
    </a>
</header>



<!-- ─── Main ─── -->
<main>
    <div class="auth-wrapper">

        <div class="brand-label">
            <span>Your Pregnancy Companion</span>
        </div>

        <div class="auth-card">

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn"         onclick="switchTab('signup')">Create Account</button>
            </div>

            <!-- ══ LOGIN PANEL ══ -->
            <form id="login-form" class="form-panel active" action="./api/login.php" method="post" novalidate>

                <p class="panel-title">Welcome back</p>
                <p class="panel-sub">Sign in to continue your journey</p>

                <div id="login-alert" class="alert"></div>

                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrap">
                        <i class="fa-regular fa-envelope icon"></i>
                        <input type="email" name="email" required placeholder="name@example.com" autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock icon"></i>
                        <input type="password" name="password" id="login-pw" required placeholder="Enter your password" autocomplete="current-password">
                        <i class="fa-regular fa-eye toggle-pw" onclick="togglePw('login-pw', this)" title="Show/hide password"></i>
                    </div>
                </div>

                <a href="#" class="forgot-link">Forgot Password?</a>

                <button type="submit" class="btn-submit" id="login-btn">
                    <span class="spinner"></span>
                    <span class="btn-label">Sign In</span>
                    <i class="fa-solid fa-arrow-right-long fa-xs"></i>
                </button>

                <div class="divider"><span>Don't have an account?</span></div>
                <p class="switch-prompt"><a href="#" onclick="switchTab('signup'); return false;">Create a free account →</a></p>
            </form>

            <!-- ══ SIGNUP PANEL ══ -->
            <form id="signup-form" class="form-panel" action="./api/signup.php" method="post" novalidate>

                <p class="panel-title">Join MotherGuide</p>
                <p class="panel-sub">Create your free account today</p>

                <div id="signup-alert" class="alert"></div>

                <div class="input-row">
                    <div class="input-group">
                        <label>First Name</label>
                        <div class="input-wrap">
                            <i class="fa-regular fa-user icon"></i>
                            <input type="text" name="first-name" required placeholder="Jane">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Last Name</label>
                        <div class="input-wrap">
                            <i class="fa-regular fa-user icon"></i>
                            <input type="text" name="last-name" required placeholder="Doe">
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrap">
                        <i class="fa-regular fa-envelope icon"></i>
                        <input type="email" name="email" required placeholder="name@example.com" autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-lock icon"></i>
                        <input type="password" name="password" id="signup-pw" required placeholder="Create a strong password" autocomplete="new-password" oninput="checkStrength(this)">
                        <i class="fa-regular fa-eye toggle-pw" onclick="togglePw('signup-pw', this)"></i>
                    </div>
                    <div class="strength-bar-wrap" id="strength-bar-wrap"><div class="strength-bar" id="strength-bar"></div></div>
                    <p class="strength-label" id="strength-label"></p>
                </div>

                <div class="input-group">
                    <label>Current Pregnancy Week</label>
                    <div class="input-wrap">
                        <i class="fa-solid fa-calendar-week icon"></i>
                        <select name="pregnancy-week" required>
                            <option value="">Select current week…</option>
                            <script>
                                for(let i=1; i<=40; i++) document.write(`<option value="${i}">Week ${i} ${i<=12?'(1st Trimester)':i<=27?'(2nd Trimester)':'(3rd Trimester)'}</option>`);
                            </script>
                        </select>
                        <i class="fa-solid fa-chevron-down select-arrow"></i>
                    </div>
                </div>

                <div class="terms-row">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                </div>

                <button type="submit" class="btn-submit" id="signup-btn" style="margin-top: 20px;">
                    <span class="spinner"></span>
                    <span class="btn-label">Create My Account</span>
                    <i class="fa-solid fa-arrow-right-long fa-xs"></i>
                </button>

                <div class="divider"><span>Already have an account?</span></div>
                <p class="switch-prompt"><a href="#" onclick="switchTab('login'); return false;">Sign in instead →</a></p>
            </form>

        </div><!-- /.auth-card -->

        <p class="footer-note">🔒 Your data is safe and never shared.</p>

    </div><!-- /.auth-wrapper -->
</main>

<script>
    /* ── Hamburger ── */
    function toggleMenu() {
        document.getElementById('hamburger').classList.toggle('open');
        document.getElementById('mobile-menu').classList.toggle('open');
    }

    /* ── Tab Switch ── */
    function switchTab(tab) {
        const isLogin = (tab === 'login');
        document.querySelectorAll('.tab-btn').forEach((btn, i) => {
            btn.classList.toggle('active', isLogin ? i === 0 : i === 1);
        });
        document.getElementById('login-form').classList.toggle('active', isLogin);
        document.getElementById('signup-form').classList.toggle('active', !isLogin);
        clearAlerts();
    }

    /* ── Password Visibility ── */
    function togglePw(id, icon) {
        const input = document.getElementById(id);
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        icon.classList.toggle('fa-eye', !isPassword);
        icon.classList.toggle('fa-eye-slash', isPassword);
    }

    /* ── Password Strength ── */
    function checkStrength(input) {
        const val   = input.value;
        const wrap  = document.getElementById('strength-bar-wrap');
        const bar   = document.getElementById('strength-bar');
        const label = document.getElementById('strength-label');
        if (!val) { wrap.style.display = 'none'; label.style.display = 'none'; return; }
        wrap.style.display = 'block'; label.style.display = 'block';
        let score = 0;
        if (val.length >= 8)            score++;
        if (/[A-Z]/.test(val))          score++;
        if (/[0-9]/.test(val))          score++;
        if (/[^A-Za-z0-9]/.test(val))   score++;
        const levels = [
            { pct: '25%', color: '#ef4444', text: 'Weak' },
            { pct: '50%', color: '#f97316', text: 'Fair' },
            { pct: '75%', color: '#eab308', text: 'Good' },
            { pct: '100%',color: '#22c55e', text: 'Strong' },
        ];
        const lvl = levels[score - 1] || levels[0];
        bar.style.width    = lvl.pct;
        bar.style.background = lvl.color;
        label.textContent  = lvl.text;
        label.style.color  = lvl.color;
    }

    /* ── Alerts ── */
    function showAlert(id, type, msg) {
        const el = document.getElementById(id);
        el.className = `alert ${type}`;
        el.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'}"></i>${msg}`;
    }
    function clearAlerts() {
        ['login-alert','signup-alert'].forEach(id => {
            const el = document.getElementById(id);
            el.className = 'alert'; el.innerHTML = '';
        });
    }

    /* ── Loading State ── */
    function setLoading(btn, state) {
        btn.classList.toggle('loading', state);
        btn.disabled = state;
    }

    /* ── Login Submit ── */
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        clearAlerts();
        setLoading(btn, true);
        try {
            const res    = await fetch('./api/login.php', { method: 'POST', body: new FormData(e.target) });
            const result = await res.json();
            if (result.status === 'success') {
                window.location.href = './tips.php';
            } else {
                showAlert('login-alert', 'error', result.message || 'Invalid email or password.');
            }
        } catch {
            showAlert('login-alert', 'error', 'Connection error. Please try again.');
        } finally {
            setLoading(btn, false);
        }
    });

    /* ── Signup Submit ── */
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn   = document.getElementById('signup-btn');
        const terms = document.getElementById('terms');
        clearAlerts();
        if (!terms.checked) {
            showAlert('signup-alert', 'error', 'Please accept the Terms of Service to continue.');
            return;
        }
        setLoading(btn, true);
        try {
            const res    = await fetch('./api/signup.php', { method: 'POST', body: new FormData(e.target) });
            const result = await res.json();
            if (result.status === 'success') {
                window.location.href = './tips.php';
            } else {
                showAlert('signup-alert', 'error', result.message || 'Could not create account. Please try again.');
            }
        } catch {
            showAlert('signup-alert', 'error', 'Connection error. Please try again.');
        } finally {
            setLoading(btn, false);
        }
    });
</script>

</body>
</html>

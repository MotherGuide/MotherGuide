<!DOCTYPE html>
<html>
<head>
    <title>Mother Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/8eed1c1f47.js" crossorigin="anonymous"></script>
</head>
<body>
    <header id="navbar">
        <div class="nav-left">
            <div class="logo">
                <img src="images/logo.png">
                MotherGuide
            </div>
        </div>
        <div class="nav-center">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Resources</a>
            <a href="#">Contact</a>
        </div>
        <div class="nav-right">
            <a class="btn btn-primary" href="#">Register</a>
            <a class="btn btn-secondary" href="#">Admin Login</a>
        </div>
    </header>

    <main>
        <div class="dashboard-container">
            <div class="welcome-box">
                <h2>Welcome, Sarah</h2>
                <p>You are in Week 18 (Second Trimester)</p>

                <div class="progress-bar">
                    <div class="progress"></div>
                </div>
            </div>

            <div class="cards">
                <div class="card">
                    <!-- <img src="images/nutrition.png"> -->
                    <i class="fa-solid fa-apple-whole card-icons"></i>
                    <h3>Nutrition Tips</h3>
                    <p>Healthy food advice this week.</p>
                    <a class="btn btn-primary">Read More</a>
                </div>

                <div class="card">
                    <!-- <img src="images/warning.png"> -->
                    <i class="fa-solid fa-triangle-exclamation card-icons"></i>
                    <h3>Warning Signs</h3>
                    <p>When to seek help.</p>
                    <a class="btn btn-primary">View</a>
                </div>

                <div class="card">
                    <!-- <img src="images/birth.png"> -->
                    <i class="fa-solid fa-baby card-icons"></i>
                    <h3>Preparing for Delivery</h3>
                    <p>Checklist for birth preparation.</p>
                    <a class="btn btn-primary">Read More</a>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
